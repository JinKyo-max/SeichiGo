<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/layout}">

<head>
  <meta charset="UTF-8">
  <title>新規会員登録 | SeichiGo</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <script th:src="@{/js/jquery.min.js}"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Kosugi+Maru&display=swap');
    body {
      margin: 0;
      background: url('/images/wallpaperbetter (1).jpg') no-repeat center center fixed;
      background-size: cover;
      font-family: "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
    }

    .page-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: flex-end;
      justify-content: flex-start;
      padding: 40px;
      box-sizing: border-box;
    }

    .character-wrapper {
      position: relative;
      width: 380px;
      height: auto;
      flex-shrink: 0;
    }

    .character-wrapper img {
      width: 100%;
      height: auto;
      display: block;
    }

    .bubble-one {
      position: absolute;
      top: 60px;
      left: 80px;
      background: white;
      color: #333;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: bold;
      border-radius: 16px;
      border: 2px solid #fcb6d0;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }

    .bubble-one::after {
      content: "";
      position: absolute;
      bottom: -12px;
      left: 40px;
      border-width: 10px 10px 0;
      border-style: solid;
      border-color: white transparent;
    }

    .bubble-one::before {
      content: "";
      position: absolute;
      bottom: -14px;
      left: 39px;
      border-width: 12px 12px 0;
      border-style: solid;
      border-color: #fcb6d0 transparent;
      z-index: -1;
    }

    .register-container {
      margin-left: 40px;
      width: 460px;
      padding: 40px 30px;
      background: rgba(255, 255, 255, 0.88);
      border-radius: 20px;
      border: 2px solid #fcb6d0;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.15);
      backdrop-filter: blur(6px);
      position: relative;
      z-index: 2;
    }

    .register-container h2 {
      text-align: center;
      font-size: 26px;
      margin-bottom: 10px;
      color: #333;
    }

    .register-container label {
      margin-top: 16px;
      margin-bottom: 6px;
      display: block;
      font-weight: bold;
      color: #444;
    }

    .register-container input[type="text"],
    .register-container input[type="email"],
    .register-container input[type="password"] {
      width: 100%;
      padding: 10px 14px;
      font-size: 15px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }

    .register-container input:focus {
      border-color: #ff79a5;
      outline: none;
    }

    .guide, #idtext, #pwtext {
      font-size: 13px;
      color: #777;
      margin-top: 3px;
    }

    .btn-area {
      margin-top: 25px;
      display: flex;
      justify-content: space-between;
    }

    .btn-primary,
    .btn-secondary {
      width: 48%;
      padding: 12px;
      font-size: 15px;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .btn-primary {
      background-color: #ff8c94;
      color: white;
    }

    .btn-primary:hover {
      background-color: #ff6b81;
    }

    .btn-secondary {
      background-color: #ddd;
      color: #444;
    }

    .btn-secondary:hover {
      background-color: #ccc;
    }

    .required {
      color: #e60033;
      font-size: 13px;
      margin-left: 5px;
    }

    @media (max-width: 768px) {
      .character-wrapper {
        display: none;
      }

      .register-container {
        margin: 20px auto;
        width: 90%;
      }
    }

    @keyframes talkingText {
      0% { opacity: 0 }
      10% { opacity: 1 }
      100% { opacity: 1 }
    }

    .bubble-one span {
      display: inline-block;
      white-space: nowrap;
      overflow: hidden;
      animation: typing 2.5s steps(20, end), talkingText 2s ease-in-out;
      border-right: 2px solid #fcb6d0;
      font-family: 'Kosugi Maru', sans-serif;
    }

    @keyframes typing {
      from { width: 0 }
      to { width: 100% }
    }
  </style>
</head>

<body>
<div layout:fragment="content">
  <div class="page-wrapper">

    <!-- 캐릭터와 말풍선 -->
    <div class="character-wrapper">
      <img src="/images/yurucamp.jpg" alt="캐릭터">
      <div class="bubble-one"><span>一緒に行きましょう。</span></div>
    </div>

    <!-- 회원가입 폼 -->
    <main class="register-container">
      <section class="register-box">
        <h2>新規会員登録</h2>
        <p class="info">入力された情報は安全に保護されます。</p>

        <form name="my" method="post" th:action="@{/user/register}">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

          <label for="nickname">お名前</label>
          <input type="text" id="nickname" name="nickname" placeholder="例：山田 太郎"/>

          <label for="id">ユーザーID <span class="required">※必須</span></label>
          <input type="text" id="id" name="id"/>
          <p id="idtext"></p>

          <label for="password">パスワード</label>
          <input type="password" id="password" name="password"/>
          <p class="guide">英大文字・小文字、数字、記号を含めて9～13文字</p>

          <label for="confirmpassword">パスワード確認</label>
          <input type="password" id="confirmpassword" name="confirmpassword"/>
          <p id="pwtext"></p>

          <label for="email">メールアドレス</label>
          <input type="email" id="email" name="email" placeholder="sample@example.com"/>

          <div class="btn-area">
            <button type="button" onclick="history.back()" class="btn-secondary">戻る</button>
            <button type="button" onclick="fn_save()" class="btn-primary">登録</button>
          </div>
        </form>
      </section>
    </main>
  </div>
</div>

<div th:replace="fragments/footer :: footer"></div>

<th:block layout:fragment="script">
<script>
  function fn_save() {
    const form = document.forms["my"];
    if (!form.nickname.value.trim()) {
      alert("お名前を入力してください。");
      form.nickname.focus();
      return;
    }

    if (!form.id.value.trim()) {
      alert("ユーザーIDを入力してください。");
      form.id.focus();
      return;
    }

    if (!form.password.value.trim()) {
      alert("パスワードを入力してください。");
      form.password.focus();
      return;
    }

    if (form.password.value !== form.confirmpassword.value) {
      alert("パスワードが一致していません。");
      form.confirmpassword.focus();
      return;
    }

    form.submit();
  }

  $(function() {
    $("#id").blur(function() {
      const userId = $(this).val();
      $.ajax({
        type: 'get',
        url: "/user/checkId",
        data: { id: userId },
        success: function(response) {
          if (response) {
            $("#idtext").text("このユーザーIDは既に使われています").css("color", "red");
          } else {
            $("#idtext").text("使用可能なユーザーIDです").css("color", "blue");
          }
        }
      });
    });

    $("#confirmpassword").on("keyup", function() {
      const pw = $("#password").val();
      const confirm = $(this).val();
      if (pw === confirm && pw.length > 0) {
        $("#pwtext").text("パスワードが一致しています").css("color", "blue");
      } else {
        $("#pwtext").text("パスワードが一致していません").css("color", "red");
      }
    });
  });
</script>
</th:block>
</body>
</html>
