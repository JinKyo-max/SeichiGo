spring.application.name=SeichiGo

server.port=8089

#mysql 연결설정
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/seichigo?serverTimezone-UTC
spring.datasource.username=seichigo
spring.datasource.password=1234


# Spring Boot DevTools 자동 리로드 및 LiveReload 비활성화
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=false
# 최대 파일 하나의 크기 (예: 10MB)
spring.servlet.multipart.max-file-size=10MB

# 전체 요청 크기 제한 (예: 10MB)
spring.servlet.multipart.max-request-size=10MB

spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.cache=false

# MyBatis 매퍼 위치 설정 (Mapper XML을 사용하는 경우)
mybatis.mapper-locations=classpath:mapper/**/*.xml

# VO 클래스가 들어 있는 패키지 (예: UserVo, ProductVo 등)
mybatis.type-aliases-package=com.seichigo.domain
